name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".github/**"
      - ".checkov.yaml"
      - ".editorconfig"
      - ".editorconfig-checker.json"
      - ".gitignore"
      - ".jscpd.json"
      - ".markdownlint.json"
      - ".pre-commit-config.yaml"
      - ".shellcheckrc"
      - ".textlintrc"
      - ".yamllint.yaml"
      - "zizmor.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Download MCP data
        continue-on-error: true
        run: node scripts/download-data.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build:ts

      - name: Test
        run: npm test
